<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業差旅政策查詢系統</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google 身份驗證 SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
        }

        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 預設長內容欄位樣式 */
        .content-cell {
            min-width: 280px;
            max-width: 550px;
            white-space: normal !important;
            word-break: break-all;
            line-height: 1.4; 
            vertical-align: top;
        }

        /* 欄位寬度樣式定義 */
        .w-10-char { width: 10em; min-width: 10em; max-width: 10em; white-space: normal !important; }
        .w-12-char { width: 12em; min-width: 12em; max-width: 12em; white-space: normal !important; }
        .w-15-char { width: 15em; min-width: 15em; max-width: 15em; white-space: normal !important; }
        .w-25-char { width: 25em; min-width: 25em; max-width: 25em; white-space: normal !important; }
        .w-30-char { width: 30em; min-width: 30em; max-width: 30em; white-space: normal !important; }

        /* 固定表頭樣式與 10pt 字級 */
        .table-sticky-header th {
            position: sticky;
            top: 0; 
            z-index: 40;
            background-color: #f8fafc; 
            box-shadow: inset 0 -2px 0 #e2e8f0;
            white-space: nowrap;
            font-size: 10pt !important;
        }

        #table-container {
            overflow: auto;
            max-height: 75vh; 
            background-color: white;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* 內容字級 12pt */
        .result-font-size {
            font-size: 12pt !important;
        }

        /* 公式與數字保護樣式：強制不斷行 */
        .nowrap-unit {
            white-space: nowrap !important;
            display: inline-block;
        }
        
        /* 搜尋詞標註：僅加粗 */
        .match-bold {
            font-weight: 800;
            color: inherit;
        }
        
        /* 幣別高亮樣式：特粗體 */
        .currency-bold {
            font-weight: 900 !important;
            color: #0f172a; 
            white-space: nowrap;
            display: inline-block;
        }
        
        /* 職務藍色系高亮 */
        .job-keyword {
            color: #1e3a8a; 
            background-color: #eff6ff;
            padding: 0 2px;
            border-radius: 3px;
            font-weight: 800;
        }

        /* 核准出差條件：Y 才標粉紅底 */
        .approval-y {
            background-color: #fff1f2 !important; 
            text-align: center !important;
            font-weight: 800;
        }

        .region-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            background-color: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        /* 捲軸美化 */
        .custom-scrollbar::-webkit-scrollbar { height: 10px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 2px solid #f1f5f9; }
        
        .sn-cell { width: 60px; text-align: center; font-weight: 600; color: #94a3b8; }

        /* 導航按鈕 */
        .scroll-hint-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem; 
            z-index: 9999;
            background-color: #2563eb;
            color: white;
            padding: 0.75rem 1.25rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            box-shadow: 0 10px 25px -3px rgba(37, 99, 235, 0.4);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }

        .scroll-hint-btn.show { opacity: 1; transform: translateY(0); pointer-events: auto; }

        /* Google 登入按鈕 */
        .google-auth-btn {
            background-color: #ffffff;
            color: #3c4043;
            border: 1px solid #dadce0;
            padding: 0.75rem 2.5rem;
            border-radius: 9999px; 
            font-family: 'Roboto', 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.30), 0 1px 3px 1px rgba(60,64,67,0.15);
        }

        .google-auth-btn:hover { background-color: #f8f9fa; }
        .google-auth-btn img { width: 18px; height: 18px; margin-right: 12px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <div id="app" class="max-w-[98%] mx-auto px-4 py-8">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-black text-slate-900 mb-2">企業差旅政策查詢系統</h1>
            <p id="sub-title" class="text-slate-400 font-medium text-sm italic">差旅台灣六站服務企業戶即時差旅政策</p>
        </header>

        <!-- 登入介面 -->
        <div id="login-view" class="flex flex-col items-center justify-center py-20 bg-white rounded-3xl shadow-xl border border-slate-200 max-w-lg mx-auto">
            <div class="mb-6 w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-xl font-bold text-slate-900 mb-2">權限驗證</h2>
            <p class="text-slate-500 mb-8 text-center px-10 text-sm">請使用具備試算表權限的 Google 帳號登入系統。</p>
            
            <button id="auth-btn" class="google-auth-btn group">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="G">
                <span>使用 Google 帳號登入</span>
            </button>
            <div id="auth-error" class="mt-6 text-red-500 font-medium hidden text-center px-6 bg-red-50 py-2 rounded-lg border border-red-100 text-xs"></div>
        </div>

        <!-- 查詢介面 -->
        <div id="query-view" class="hidden">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-4">
                <div class="flex flex-col md:flex-row items-stretch gap-3">
                    <div class="flex-1 relative flex flex-col gap-2">
                        <div class="relative flex items-center">
                            <span class="absolute left-4 text-slate-400">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                </svg>
                            </span>
                            <input type="text" id="searchInput" 
                                placeholder="請輸入關鍵字（代碼、姓名或企業名稱）" 
                                class="w-full pl-12 pr-4 py-4 bg-slate-100 rounded-xl border border-slate-200 focus:bg-white focus:ring-2 focus:ring-blue-400 outline-none transition-all placeholder:text-slate-500 text-slate-800 font-bold"
                                onkeydown="if(event.key === 'Enter') performSearch()">
                        </div>
                        <!-- PCC 快捷按鈕 -->
                        <div class="flex items-center gap-2 pl-2">
                            <button onclick="searchPCC()" class="px-4 py-1.5 bg-blue-50 text-blue-700 hover:bg-blue-600 hover:text-white rounded-lg text-xs font-black transition-all border border-blue-100 shadow-sm">
                                PCC
                            </button>
                            <span class="text-[10px] text-slate-300 italic">快捷查詢 PCC 分頁內容</span>
                        </div>
                    </div>
                    <button id="searchBtn" onclick="performSearch()" 
                        class="px-8 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-colors shadow-md h-[58px]">
                        查詢
                    </button>
                    <button onclick="signOut()" class="px-4 py-2 text-xs font-bold text-slate-400 hover:text-red-500">登出</button>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl border border-slate-200 mb-6 shadow-sm">
                <div class="flex items-center justify-between mb-4 border-b border-slate-100 pb-3">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">欄位顯示：</h3>
                    <button id="selectAllBtn" onclick="toggleAllColumns(true)" class="text-blue-600 text-xs font-bold">全選</button>
                </div>
                <div id="column-filters" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-7 gap-x-4 gap-y-3">
                    <span class="text-slate-300 text-xs italic">載入中...</span>
                </div>
            </div>

            <div id="loading" class="flex flex-col items-center justify-center py-24 hidden">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-10 w-10 mb-4"></div>
                <p class="text-slate-400 font-bold">同步雲端數據中...</p>
            </div>
            <div id="result-count" class="mb-4 inline-flex items-center px-4 py-2 bg-slate-800 rounded-lg text-xs font-bold text-white shadow-sm hidden"></div>

            <div class="relative">
                <div id="table-container" class="custom-scrollbar hidden">
                    <table id="main-table" class="min-w-full border-separate border-spacing-0">
                        <thead id="tableHeader" class="table-sticky-header"></thead>
                        <tbody id="tableBody" class="text-slate-700 font-medium result-font-size"></tbody>
                    </table>
                </div>
            </div>
            
            <div id="noResults" class="hidden flex flex-col items-center justify-center py-32 bg-white rounded-2xl border border-slate-200 shadow-inner text-slate-400">
                <h3 class="text-sm font-bold uppercase tracking-widest">查對不到相符資料</h3>
            </div>
        </div>
    </div>

    <!-- 左右導航提示 -->
    <div id="scroll-hint-right" class="scroll-hint-btn" onclick="scrollTable('right')">
        更多資訊 <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 animate-bounce" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" /></svg>
    </div>
    <div id="scroll-hint-left" class="scroll-hint-btn" style="left: 2rem; right: auto;" onclick="scrollTable('left')">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M11 17l-5-5m0 0l5-5m-5 5h12" /></svg> 返回前面
    </div>

    <script>
        const CLIENT_ID = '888137251021-14u8ge7mc2di0rji31tm18unta568lou.apps.googleusercontent.com'; 
        const SPREADSHEET_ID = '1csWqYCN82PEoe27Nuz5KxY6uM_4Qb_UgBA-6Okooj2g';
        const TARGET_SHEETS = [
            '行政-合約管理(台北)', '行政-合約管理(桃園)', '行政-合約管理(新竹)', 
            '行政-合約管理(台中)', '行政-合約管理(台南)', '行政-合約管理(高雄)',
            'PCC' // 加入 PCC 來源分頁
        ];

        const DISPLAY_CONFIG = [
            { original: "序號", display: "序號", isSN: true },
            { original: "區域來源", display: "區域", isSource: true }, 
            { original: "法人代碼", display: "法人代碼", searchKeys: ["法人代碼", "法人", "代碼", "代號", "CLIENTID", "CODE"] },
            { original: "企業同行名稱", display: "企業名稱", widthClass: "w-10-char", searchKeys: ["企業名稱", "公司", "戶名", "企業同行"] },
            { original: "主要服務單位", display: "服務單位", searchKeys: ["主要服務單位", "服務單位", "單位"] },
            { original: "主要服務業務", display: "業務", widthClass: "w-10-char", searchKeys: ["主要服務業務", "業務姓名", "業務"] },
            { original: "出差是否需經過核准", display: "核准出差", isApproval: true, searchKeys: ["出差是否需經過核准", "核准", "是否需核准"] }, 
            { original: "開票&改票流程及規範說明", display: "開票流程", widthClass: "w-25-char", searchKeys: ["開票流程", "規範說明"] },
            { original: "機票差旅政策 AIR (範例: 可訂艙等職級/條件、差旅偏好)", display: "機票政策", widthClass: "w-30-char", searchKeys: ["機票政策", "機票", "AIR"] },
            { original: "飯店費用預算/條件 HOTEL", display: "飯店政策", widthClass: "w-25-char", searchKeys: ["飯店費用", "飯店政策", "酒店", "HOTEL"] },
            { original: "報價策略", display: "報價策略", widthClass: "w-15-char", searchKeys: ["報價策略", "策略", "報價"] },
            { original: "付款方式", display: "付款", widthClass: "w-12-char", searchKeys: ["付款方式", "付款", "PAYMENT"] },
            { original: "代轉開立", display: "代轉", widthClass: "w-15-char", searchKeys: ["代轉開立", "代轉", "開立"] },
            { original: "注意事項", display: "注意事項", searchKeys: ["注意事項", "注意", "備註"] },
            { original: "更新時間 (可直接打上2/12會自動加上年份)", display: "更新時間", searchKeys: ["更新時間", "日期"] },
            // 新增 PCC 模式所需欄位 (15, 16)
            { original: "各站 Sabre PCC", display: "各站 PCC", searchKeys: ["各站", "SABRE", "PCC"] },
            { original: "企業戶特殊PCC", display: "特殊 PCC", searchKeys: ["企業戶", "特殊", "PCC"] }
        ];

        let allMergedData = []; 
        let currentRows = []; 
        let columnVisibility = []; 
        let lastSearchTerm = "";
        let accessToken = null;

        function initGoogleAuth() {
            if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
                const tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
                    callback: (response) => {
                        if (response.error !== undefined) return;
                        accessToken = response.access_token;
                        showQueryView();
                        fetchSheetData();
                    },
                });
                document.getElementById('auth-btn').onclick = () => tokenClient.requestAccessToken({ prompt: 'consent' });
            } else { setTimeout(initGoogleAuth, 800); }
        }

        window.onload = initGoogleAuth;
        function signOut() { location.reload(); }
        function showQueryView() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('query-view').classList.remove('hidden');
        }

        function getCssColor(color) {
            if (!color) return null;
            const r = Math.round((color.red || 0) * 255);
            const g = Math.round((color.green || 0) * 255);
            const b = Math.round((color.blue || 0) * 255);
            if (r === 0 && g === 0 && b === 0) return null;
            return `rgb(${r},${g},${b})`;
        }

        function cellToHtml(cell) {
            const text = cell.formattedValue || "";
            if (!text) return "";
            const baseColor = getCssColor(cell.effectiveFormat?.textFormat?.foregroundColor);
            if (!cell.textFormatRuns || cell.textFormatRuns.length === 0) {
                return baseColor ? `<span style="color:${baseColor}; font-weight:800;">${text}</span>` : text;
            }
            let html = "";
            let runs = cell.textFormatRuns;
            for (let i = 0; i < runs.length; i++) {
                const run = runs[i];
                const startIndex = run.startIndex || 0;
                const nextStartIndex = (i + 1 < runs.length) ? runs[i+1].startIndex : text.length;
                const segment = text.substring(startIndex, nextStartIndex);
                const color = getCssColor(run.format?.foregroundColor) || baseColor;
                if (color) { html += `<span style="color:${color}; font-weight:800;">${segment}</span>`; } 
                else { html += segment; }
            }
            return html;
        }

        async function fetchSheetData() {
            const loadingEl = document.getElementById('loading');
            loadingEl.classList.remove('hidden');

            try {
                const rangesParam = TARGET_SHEETS.map(s => `ranges=${encodeURIComponent(s + '!A1:Z2000')}`).join('&');
                const fields = "sheets(properties/title,data(rowData(values(effectiveFormat/textFormat/foregroundColor,textFormatRuns,formattedValue))))";
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}?${rangesParam}&fields=${encodeURIComponent(fields)}`;
                
                const response = await fetch(url, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                const data = await response.json();
                
                allMergedData = [];

                if (data.sheets) {
                    data.sheets.forEach((sheet) => {
                        const title = sheet.properties.title;
                        const regionLabel = title.match(/\((.*?)\)/)?.[1] || (title === "PCC" ? "PCC" : "總部");
                        const rows = sheet.data[0].rowData;
                        if (!rows || rows.length < 1) return;

                        let headerIdx = -1;
                        for (let i = 0; i < Math.min(rows.length, 10); i++) {
                            const rowCells = rows[i].values || [];
                            const rowText = rowCells.map(c => (c.formattedValue || "")).join("");
                            if (rowText.includes("企業") || rowText.includes("法人") || rowText.includes("代碼") || rowText.includes("PCC")) {
                                headerIdx = i;
                                break;
                            }
                        }
                        if (headerIdx === -1) headerIdx = 0;

                        const rawHeaders = rows[headerIdx].values || [];
                        const cleanedHeaders = rawHeaders.map(h => (h.formattedValue || "").toString().replace(/[\s\n\r\t]/g, "").toUpperCase());
                        
                        const mapping = DISPLAY_CONFIG.map(config => {
                            if (config.isSN || config.isSource) return -1;
                            const target = config.original.replace(/[\s\n\r\t]/g, "").toUpperCase();
                            let idx = cleanedHeaders.findIndex(h => h === target);
                            if (idx === -1 && config.searchKeys) {
                                idx = cleanedHeaders.findIndex(h => config.searchKeys.some(key => h.includes(key.toUpperCase())));
                            }
                            if (idx === -1) {
                                idx = cleanedHeaders.findIndex(h => h !== "" && (h.includes(target) || target.includes(h)));
                            }
                            return idx;
                        });

                        rows.slice(headerIdx + 1).forEach(row => {
                            if (!row.values || row.values.every(c => !c.formattedValue || c.formattedValue.trim() === "")) return;
                            const normalizedRowData = mapping.map(idx => {
                                if (idx === -1 || !row.values[idx]) return "";
                                return cellToHtml(row.values[idx]);
                            });
                            allMergedData.push({
                                __source: regionLabel,
                                __raw: row.values.map(c => c.formattedValue || ""),
                                data: normalizedRowData
                            });
                        });
                    });

                    // 預設除 PCC 相關欄位外全選
                    columnVisibility = new Array(DISPLAY_CONFIG.length).fill(true);
                    columnVisibility[15] = false;
                    columnVisibility[16] = false;
                    initColumnFilters();
                }
            } catch (err) { console.error("同步失敗:", err); } 
            finally { loadingEl.classList.add('hidden'); }
        }

        // 核心功能：PCC 模式視圖切換
        function searchPCC() {
            const input = document.getElementById('searchInput');
            input.value = "PCC";
            lastSearchTerm = "PCC";
            
            // 智慧切換顯示欄位：僅顯示 序號(0), 區域(1), 各站PCC(15), 特殊PCC(16)
            columnVisibility = columnVisibility.map((v, i) => [0, 1, 15, 16].includes(i));
            
            // 同步 UI 勾選狀態
            const checkboxes = document.querySelectorAll('#column-filters input[type="checkbox"]');
            checkboxes.forEach((cb, idx) => {
                // 注意：Checkbox 列表是從 DISPLAY_CONFIG[2] 開始渲染的
                cb.checked = columnVisibility[idx + 2];
            });

            const results = allMergedData.filter(rowObj => rowObj.__source === 'PCC');
            
            document.getElementById('noResults').classList.add('hidden');
            renderTable(results);
        }

        function initColumnFilters() {
            const container = document.getElementById('column-filters');
            container.innerHTML = '';
            DISPLAY_CONFIG.forEach((config, index) => {
                if (config.isSN || config.isSource) return;
                const label = document.createElement('label');
                label.className = "flex items-center cursor-pointer group px-2 py-1 rounded-lg transition-colors hover:bg-slate-100";
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = columnVisibility[index];
                checkbox.className = "w-4 h-4 text-blue-600 bg-slate-100 border-slate-300 rounded focus:ring-blue-500 flex-shrink-0";
                checkbox.onchange = (e) => {
                    columnVisibility[index] = e.target.checked;
                    if (currentRows.length > 0) renderTable(currentRows);
                };
                const span = document.createElement('span');
                span.className = "ml-2.5 text-slate-600 group-hover:text-blue-600 font-bold whitespace-nowrap overflow-hidden text-ellipsis text-[12pt]";
                span.textContent = config.display;
                label.appendChild(checkbox); label.appendChild(span);
                container.appendChild(label);
            });
        }

        function toggleAllColumns(isVisible) {
            const checkboxes = document.getElementById('column-filters').querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach((cb, idx) => {
                cb.checked = isVisible;
                columnVisibility[idx + 2] = isVisible; 
            });
            if (currentRows.length > 0) renderTable(currentRows);
        }

        function highlightCurrencies(text) {
            if (!text) return "";
            const currencyRegex = /\b(USD|TWD|NTD|HKD|JPY|EUR|CNY|RMB|SGD|AUD|GBP|CAD|CHF)\b/g;
            return text.replace(currencyRegex, '<span class="currency-bold">$1</span>');
        }

        function highlightJobKeywords(text) {
            if (!text) return "";
            const parts = text.split(/(<[^>]+>)/g);
            return parts.map(part => {
                if (part && part.startsWith('<')) return part;
                return part.replace(/(董事長|總經理|執行長|營運長|財務長|技術長|副總|協理|總監|經理|襄理|副理|主任|組長)/g, '<span class="job-keyword">$1</span>');
            }).join('');
        }

        function wrapNowrapUnits(text) {
            if (!text) return "";
            const parts = text.split(/(<[^>]+>)/g);
            return parts.map(part => {
                if (part && part.startsWith('<')) return part;
                return part.replace(/([\*\+]\d+(\.\d+)?%?)|(\d+[\.\)])|([一二三四五六七八九十]+[、\.])/g, (match) => {
                    return `<span class="nowrap-unit">${match}</span>`;
                });
            }).join('');
        }

        function boldMatches(text, term) {
            if (!text || !term) return text;
            if (term.trim() === '公司') return text;
            const parts = text.split(/(<[^>]+>)/g);
            const regex = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return parts.map(part => {
                if (part && part.startsWith('<')) return part;
                return part.replace(regex, '<b class="match-bold">$1</b>');
            }).join('');
        }

        function renderTable(rows) {
            const headerEl = document.getElementById('tableHeader');
            const bodyEl = document.getElementById('tableBody');
            const container = document.getElementById('table-container');
            const countEl = document.getElementById('result-count');
            headerEl.innerHTML = ''; bodyEl.innerHTML = '';

            container.classList.remove('hidden');
            countEl.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg> 共 ${rows.length} 筆搜尋結果`;
            countEl.classList.remove('hidden');
            currentRows = rows; 

            const headerRow = document.createElement('tr');
            DISPLAY_CONFIG.forEach((config, index) => {
                if (!columnVisibility[index]) return;
                const th = document.createElement('th');
                th.className = "px-6 py-4 text-left font-black text-slate-500 uppercase tracking-widest border-b border-slate-200";
                if (config.widthClass) th.classList.add(config.widthClass);
                if (config.isSN) th.className += " sn-cell";
                th.textContent = config.display;
                headerRow.appendChild(th);
            });
            headerEl.appendChild(headerRow);

            rows.forEach((rowObj, rowIndex) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50 transition-colors duration-200 align-top";
                DISPLAY_CONFIG.forEach((config, i) => {
                    if (!columnVisibility[i]) return;
                    const td = document.createElement('td');
                    td.className = "px-6 py-5 border-b border-slate-200";
                    
                    let html = "";
                    if (config.isSN) {
                        td.className += " sn-cell opacity-60 font-bold";
                        html = rowIndex + 1;
                    } else if (config.isSource) {
                        html = `<span class="region-badge">${rowObj.__source}</span>`;
                    } else {
                        let valHtml = rowObj.data[i] || "";
                        if (config.isApproval) {
                            const textOnly = valHtml.replace(/<[^>]+>/g, "").trim();
                            if (textOnly === "是" || textOnly === "Y") { valHtml = "Y"; td.classList.add('approval-y'); }
                            else if (textOnly === "否" || textOnly === "N") { valHtml = "N"; td.classList.add('text-center'); }
                            else { valHtml = ""; }
                        }
                        const autoWrapFields = ["機票政策", "飯店政策", "報價策略", "開票流程", "注意事項", "各站 Sabre PCC", "企業戶特殊PCC"];
                        if (autoWrapFields.includes(config.display)) {
                            valHtml = valHtml.replace(/(\r\n|\n|\r)+/g, '\n').trim();
                            valHtml = valHtml.replace(/\n/g, '<br>');
                            valHtml = valHtml.replace(/(?<!<br>|^)([●■◆・])/g, '<br>$1');
                        }
                        if (config.widthClass) td.classList.add(config.widthClass);
                        else if (valHtml.length > 25) td.classList.add('content-cell');
                        else td.classList.add('whitespace-nowrap');

                        let resultHtml = valHtml;
                        const textOnlyForSearch = resultHtml.replace(/<[^>]+>/g, "").trim().toLowerCase();
                        if (textOnlyForSearch !== lastSearchTerm.toLowerCase()) {
                            resultHtml = boldMatches(resultHtml, lastSearchTerm); 
                            resultHtml = highlightJobKeywords(resultHtml);
                            resultHtml = highlightCurrencies(resultHtml); 
                            resultHtml = wrapNowrapUnits(resultHtml); 
                        }
                        html = resultHtml;
                    }
                    td.innerHTML = html;
                    tr.appendChild(td);
                });
                bodyEl.appendChild(tr);
            });
            setTimeout(updateScrollHints, 150);
        }

        function scrollTable(direction) {
            const container = document.getElementById('table-container');
            const scrollDist = container.clientWidth * 0.7; 
            container.scrollBy({ left: direction === 'right' ? scrollDist : -scrollDist, behavior: 'smooth' });
        }

        function updateScrollHints() {
            const container = document.getElementById('table-container');
            const hintRight = document.getElementById('scroll-hint-right');
            const hintLeft = document.getElementById('scroll-hint-left');
            if (!container) return;
            const isOverflowing = container.scrollWidth > (container.clientWidth + 10);
            const isAtStart = container.scrollLeft <= 20;
            const isAtEnd = (container.scrollLeft + container.clientWidth) >= (container.scrollWidth - 30);
            if (isOverflowing && !isAtEnd) hintRight.classList.add('show'); else hintRight.classList.remove('show');
            if (isOverflowing && !isAtStart) hintLeft.classList.add('show'); else hintLeft.classList.remove('show');
        }

        document.getElementById('table-container').onscroll = updateScrollHints;
        window.onresize = updateScrollHints;

        function performSearch(skipLoading = false) {
            const term = document.getElementById('searchInput').value.trim();
            lastSearchTerm = term;
            if (allMergedData.length === 0) return;
            if (!term) {
                document.getElementById('table-container').classList.add('hidden');
                document.getElementById('result-count').classList.add('hidden');
                return;
            }
            const loadingEl = document.getElementById('loading');
            if (!skipLoading) loadingEl.classList.remove('hidden');

            const searchAction = () => {
                currentRows = allMergedData.filter(rowObj => {
                    return rowObj.__raw.some(cell => (cell || "").toString().toLowerCase().includes(term.toLowerCase()));
                });
                loadingEl.classList.add('hidden');
                if (currentRows.length === 0) {
                    document.getElementById('table-container').classList.add('hidden');
                    document.getElementById('noResults').classList.remove('hidden');
                } else {
                    document.getElementById('noResults').classList.add('hidden');
                    renderTable(currentRows);
                }
            };
            if (skipLoading) searchAction(); else setTimeout(searchAction, 400); 
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            if (!e.target.value.trim()) {
                document.getElementById('table-container').classList.add('hidden');
                document.getElementById('result-count').classList.add('hidden');
                document.getElementById('noResults').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
