<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業差旅政策查詢系統</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google 身份驗證 SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .content-cell {
            min-width: 250px;
            max-width: 500px;
            white-space: normal !important;
            word-break: break-all;
            line-height: 1.6;
            vertical-align: top;
        }

        /* 核心優化：固定表頭樣式 */
        .table-sticky-header th {
            position: sticky;
            top: 0; 
            z-index: 40;
            background-color: #f8fafc; 
            box-shadow: inset 0 -1px 0 #e2e8f0, 0 1px 2px rgba(0,0,0,0.05);
            white-space: nowrap;
        }

        /* 表格容器 */
        #table-container {
            overflow: auto;
            max-height: 78vh; 
            background-color: white;
            border-radius: 1rem;
        }

        /* 搜尋結果字級：12pt */
        .result-font-size {
            font-size: 12pt !important;
        }

        /* 數字高亮樣式 (紅色加粗) */
        .highlight-num {
            color: #dc2626; 
            font-weight: 800;
        }
        
        /* 搜尋詞匹配樣式 (藍色加粗) */
        .match-bold {
            color: #2563eb; 
            font-weight: 800;
        }
        
        /* 幣別高亮樣式 (純加粗) */
        .currency-bold {
            font-weight: 800;
        }
        
        /* 職稱/職級關鍵字高亮 (深藍色粗體) */
        .job-keyword {
            color: #1e3a8a; 
            font-weight: 800;
        }

        /* 捲軸美化 */
        .custom-scrollbar::-webkit-scrollbar {
            height: 10px;
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 5px;
            border: 2px solid #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #2563eb;
        }
        
        /* 專用窄欄位樣式 */
        .sn-cell {
            width: 60px;
            text-align: center;
            font-weight: 600;
            color: #64748b;
        }
        .source-cell {
            width: 100px;
            text-align: center;
            font-weight: 700;
            color: #3b82f6;
            background-color: #eff6ff;
        }

        /* 底部滑動提示通用樣式 */
        .scroll-hint-btn {
            position: fixed;
            bottom: 2rem;
            z-index: 9999;
            background-color: rgba(37, 99, 235, 0.95);
            color: white;
            padding: 0.8rem 1.6rem;
            border-radius: 9999px;
            font-size: 0.9rem;
            font-weight: 800;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.5);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            user-select: none;
            backdrop-filter: blur(4px);
        }

        .scroll-hint-btn:hover {
            background-color: rgba(29, 78, 216, 1);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 15px 30px -5px rgba(37, 99, 235, 0.6);
        }

        .scroll-hint-btn:active {
            transform: translateY(0) scale(0.95);
        }

        .scroll-hint-btn.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        #scroll-hint-right { right: 2rem; }
        #scroll-hint-left { left: 2rem; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div id="app" class="max-w-[98%] mx-auto px-4 py-8">
        <!-- 標題區 -->
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-extrabold text-slate-800 mb-2">企業差旅政策查詢</h1>
            <p id="sub-title" class="text-slate-500 font-medium italic">已整合：台北、桃園、新竹、台中、台南、高雄全區資料</p>
        </header>

        <!-- 登入介面 -->
        <div id="login-view" class="flex flex-col items-center justify-center py-20 bg-white rounded-3xl shadow-xl border border-slate-100 max-w-xl mx-auto">
            <div class="mb-8 p-4 bg-blue-50 rounded-full text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 mb-4">身份驗證</h2>
            <p class="text-slate-600 mb-8 text-center px-6">
                本系統包含內部報價資訊，請使用具備「試算表權限」的 Google 帳號登入。
            </p>
            
            <div class="relative">
                <button id="auth-btn" onclick="handleAuthClick()" class="flex items-center px-8 py-4 bg-white border border-slate-300 rounded-2xl shadow-sm hover:bg-slate-50 hover:shadow-md transition-all duration-300 text-slate-700 font-bold group disabled:opacity-50 disabled:cursor-wait">
                    <img id="g-logo" src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-6 h-6 mr-4 group-hover:scale-110 transition-transform" alt="Google">
                    <span id="btn-text">使用 Google 帳號登入</span>
                </button>
            </div>
            <div id="auth-error" class="mt-6 text-red-500 font-medium hidden text-center px-4 bg-red-50 py-3 rounded-xl border border-red-100 max-sm mx-auto"></div>
        </div>

        <!-- 查詢介面 -->
        <div id="query-view" class="hidden">
            <!-- 搜尋與登出區 -->
            <div class="bg-white p-6 rounded-t-3xl shadow-lg border border-slate-100">
                <div class="flex flex-col md:flex-row md:items-center gap-4">
                    <div class="flex flex-1 relative group shadow-sm rounded-2xl overflow-hidden border border-slate-200">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </span>
                        <input type="text" id="searchInput" 
                            placeholder="跨區域搜尋：企業代碼、業務姓名、企業戶名稱" 
                            class="block w-full pl-12 pr-4 py-4 bg-slate-50 focus:bg-white outline-none transition-all placeholder:text-slate-400 text-slate-700 font-bold"
                            onkeydown="if(event.key === 'Enter') performSearch()">
                        
                        <button id="searchBtn" onclick="performSearch()" 
                            class="px-8 bg-blue-600 text-white font-bold hover:bg-blue-700 active:bg-blue-800 transition-colors whitespace-nowrap">
                            查詢
                        </button>
                    </div>
                    <button onclick="signOut()" class="px-4 py-2 text-sm font-medium text-slate-400 hover:text-red-500 transition-colors border border-slate-200 rounded-xl">登出</button>
                </div>
            </div>

            <!-- 欄位篩選核選方塊區 -->
            <div class="bg-slate-50 p-6 border-x border-b border-slate-100 rounded-b-3xl shadow-sm mb-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                        </svg>
                        顯示欄位篩選
                    </h3>
                    <div class="flex gap-4 text-xs">
                        <button onclick="toggleAllColumns(true)" class="text-blue-600 hover:underline font-bold">全選</button>
                    </div>
                </div>
                <div id="column-filters" class="flex flex-wrap gap-x-6 gap-y-3">
                    <span class="text-slate-400 text-xs italic">正在載入試算表欄位設定...</span>
                </div>
            </div>

            <div id="loading" class="flex flex-col items-center justify-center py-20 hidden">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-10 w-10 mb-4"></div>
                <p id="loadingText" class="text-slate-400 font-medium text-lg text-center">正在同步雲端資料，請稍候...</p>
            </div>

            <div id="api-error-display" class="hidden max-w-2xl mx-auto p-8 bg-white border-2 border-red-200 rounded-3xl shadow-xl text-center mb-10">
                <div class="bg-red-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
                <h3 class="text-xl font-extrabold text-slate-800 mb-2">資料讀取失敗</h3>
                <p id="api-error-msg" class="text-red-600 font-medium mb-6">原因：網路連線逾時</p>
                <button onclick="fetchSheetData()" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold hover:bg-slate-900 transition-all">重新讀取資料</button>
            </div>

            <!-- 結果筆數顯示區域 -->
            <div id="result-count" class="mb-3 px-4 py-1 text-sm font-bold text-slate-500 hidden border-l-4 border-blue-500 bg-blue-50/50 inline-block rounded-r-lg"></div>

            <!-- 表格區域 -->
            <div class="relative">
                <div id="table-container" class="custom-scrollbar shadow-xl border border-slate-100 hidden">
                    <table id="main-table" class="min-w-full border-separate border-spacing-0">
                        <thead id="tableHeader" class="table-sticky-header"></thead>
                        <tbody id="tableBody" class="text-slate-600 font-medium result-font-size"></tbody>
                    </table>
                </div>
            </div>
            
            <div id="noResults" class="hidden flex flex-col items-center justify-center py-20 bg-white rounded-3xl border border-slate-100 shadow-sm">
                <div class="text-slate-200 mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 9.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-slate-400">跨區域搜尋：查無符合條件的資料</h3>
                <p id="noResultsDetail" class="text-slate-300 mt-2 text-center px-6">請檢查關鍵字是否有誤，或是您目前對某些分頁無檢視權限。</p>
            </div>
        </div>
    </div>

    <!-- 左右滑動提示按鈕 -->
    <div id="scroll-hint-right" class="scroll-hint-btn" onclick="scrollTable('right')">
        向右滑動看更多資料 <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 animate-bounce" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
    </div>
    <div id="scroll-hint-left" class="scroll-hint-btn" onclick="scrollTable('left')">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 animate-bounce" style="animation-direction: reverse" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg> 向左滑動看前面資料
    </div>

    <script>
        /** --- 多分頁核心設定 --- **/
        const CLIENT_ID = '888137251021-14u8ge7mc2di0rji31tm18unta568lou.apps.googleusercontent.com'; 
        const SPREADSHEET_ID = '1csWqYCN82PEoe27Nuz5KxY6uM_4Qb_UgBA-6Okooj2g';
        
        const TARGET_SHEETS = [
            '行政-合約管理(台北)', 
            '行政-合約管理(桃園)', 
            '行政-合約管理(新竹)', 
            '行政-合約管理(台中)',
            '行政-合約管理(台南)',
            '行政-合約管理(高雄)'
        ];

        const DISPLAY_CONFIG = [
            { original: "序號", display: "序號", isSN: true },
            { original: "區域來源", display: "區域", isSource: true }, 
            { original: "法人代碼", display: "法人代碼" },
            { original: "企業同行名稱", display: "企業同行名稱" },
            { original: "主要服務單位", display: "主要服務單位" },
            { original: "主要服務業務", display: "主要服務業務" },
            { original: "出差是否需經過核准", display: "需核淮出差" },
            { original: "開票&改票流程及規範說明", display: "開票改票流程規範" },
            { original: "機票差旅政策 AIR (範例: 可訂艙等職級/條件、差旅偏好)", display: "機票差旅政策" },
            { original: "飯店費用預算/條件 HOTEL", display: "酒店差旅政策" },
            { original: "報價策略", display: "報價策略" },
            { original: "付款方式", display: "付款方式" },
            { original: "代轉開立", display: "代轉開立" },
            { original: "注意事項", display: "注意事項" },
            { original: "更新時間 (可直接打上2/12會自動加上年份)", display: "最近更新時間" }
        ];

        let allMergedData = []; 
        let currentRows = []; 
        let columnMapping = []; 
        let tokenClient = null;
        let accessToken = null;
        let isGoogleSdkLoaded = false;
        let columnVisibility = []; 
        let lastSearchTerm = "";

        function initGoogleAuth() {
            if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
                try {
                    tokenClient = google.accounts.oauth2.initTokenClient({
                        client_id: CLIENT_ID,
                        scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
                        callback: (response) => {
                            if (response.error !== undefined) {
                                showError("登入授權失敗: " + response.error);
                                return;
                            }
                            accessToken = response.access_token;
                            showQueryView();
                            fetchSheetData();
                        },
                    });
                    isGoogleSdkLoaded = true;
                    document.getElementById('auth-btn').disabled = false;
                } catch (e) {
                    showError("系統初始化失敗，請重新整理頁面。");
                }
            } else {
                setTimeout(initGoogleAuth, 800);
            }
        }

        window.onload = initGoogleAuth;

        function handleAuthClick() {
            if (!isGoogleSdkLoaded || !tokenClient) return;
            tokenClient.requestAccessToken({ prompt: 'consent' });
        }

        function signOut() {
            if (accessToken) google.accounts.oauth2.revokeToken(accessToken);
            location.reload();
        }

        function showQueryView() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('query-view').classList.remove('hidden');
        }

        function showError(msg) {
            const errorEl = document.getElementById('auth-error');
            errorEl.innerText = msg;
            errorEl.classList.remove('hidden');
        }

        async function fetchSheetData() {
            const loadingEl = document.getElementById('loading');
            const errorDisplay = document.getElementById('api-error-display');
            const tableContainer = document.getElementById('table-container');
            
            errorDisplay.classList.add('hidden');
            tableContainer.classList.add('hidden');
            loadingEl.classList.remove('hidden');

            try {
                const rangesParam = TARGET_SHEETS.map(s => `ranges=${encodeURIComponent(s + '!A1:Z2000')}`).join('&');
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values:batchGet?${rangesParam}`;
                
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();
                
                if (data.error) throw new Error(data.error.message);
                
                allMergedData = [];
                let firstSheetHeaders = [];

                if (data.valueRanges && data.valueRanges.length > 0) {
                    data.valueRanges.forEach((vr, index) => {
                        const sheetFullName = TARGET_SHEETS[index];
                        const regionLabel = sheetFullName.match(/\((.*?)\)/)?.[1] || sheetFullName;
                        const rows = vr.values;
                        
                        if (rows && rows.length > 0) {
                            if (index === 0) firstSheetHeaders = rows[0]; 
                            rows.slice(1).forEach(row => {
                                if (row.length === 0 || row.every(c => !c || c.trim() === "")) return;
                                const rowWithMeta = [...row];
                                rowWithMeta.__sheetSource = regionLabel;
                                allMergedData.push(rowWithMeta);
                            });
                        }
                    });

                    buildColumnMapping(firstSheetHeaders);
                    columnVisibility = new Array(DISPLAY_CONFIG.length).fill(true);
                    initColumnFilters();
                    
                    if (document.getElementById('searchInput').value.trim() !== "") {
                        performSearch(true);
                    }
                } else {
                    showNoResultsFound("試算表內目前無有效資料。");
                }
            } catch (err) {
                document.getElementById('api-error-msg').innerText = "原因：" + err.message;
                errorDisplay.classList.remove('hidden');
            } finally {
                loadingEl.classList.add('hidden');
            }
        }

        function buildColumnMapping(sheetHeaders) {
            columnMapping = [];
            DISPLAY_CONFIG.forEach(config => {
                if (config.isSN) { columnMapping.push(-2); return; }
                if (config.isSource) { columnMapping.push(-3); return; }
                const idx = sheetHeaders.findIndex(h => h.trim().includes(config.original.substring(0, 10)));
                columnMapping.push(idx);
            });
        }

        function initColumnFilters() {
            const container = document.getElementById('column-filters');
            container.innerHTML = '';
            DISPLAY_CONFIG.forEach((config, index) => {
                if (config.isSN || config.isSource) return;
                const label = document.createElement('label');
                label.className = "inline-flex items-center cursor-pointer group";
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = true;
                checkbox.className = "w-4 h-4 text-blue-600 bg-slate-100 border-slate-300 rounded focus:ring-blue-500";
                checkbox.onchange = (e) => {
                    columnVisibility[index] = e.target.checked;
                    if (!document.getElementById('table-container').classList.contains('hidden')) renderTable(currentRows);
                };
                const span = document.createElement('span');
                span.className = "ml-2 text-sm text-slate-600 group-hover:text-blue-600 transition-colors font-medium";
                span.textContent = config.display;
                label.appendChild(checkbox);
                label.appendChild(span);
                container.appendChild(label);
            });
        }

        function toggleAllColumns(isVisible) {
            const checkboxes = document.getElementById('column-filters').querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach((cb) => cb.checked = isVisible);
            columnVisibility.forEach((_, idx) => {
                if (idx > 1) columnVisibility[idx] = isVisible; 
            });
            if (!document.getElementById('table-container').classList.contains('hidden')) renderTable(currentRows);
        }

        // 幣別高亮邏輯
        function highlightCurrencies(text) {
            if (!text) return "";
            const currencyRegex = /\b(USD|TWD|HKD|JPY|EUR|CNY|RMB|SGD|AUD|GBP|CAD|CHF)\b/g;
            return text.replace(currencyRegex, '<span class="currency-bold">$1</span>');
        }

        // 職級標示邏輯：深藍色粗體
        function highlightJobKeywords(text) {
            if (!text) return "";
            return text.replace(/(職級|職稱|董事長|總經理|副總)/g, '<span class="job-keyword">$1</span>');
        }

        // 數字高亮邏輯：排除項目編號 (如 1. 2. 或 一、 二、)
        function highlightNumbers(text) {
            if (!text) return "";
            return text.replace(/(\d+[\.\)])|(\(\d+\))|([一二三四五六七八九十]+[、\.])|(\d+)|([一二三四五六七八九十百千萬零]+)/g, (match, p1, p2, p3, p4, p5) => {
                if (p1 || p2 || p3) return match; 
                return `<span class="highlight-num">${match}</span>`;
            });
        }

        function boldMatches(text, term) {
            if (!text || !term) return text;
            const regex = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, '<b class="match-bold">$1</b>');
        }

        function renderTable(dataRows) {
            const headerEl = document.getElementById('tableHeader');
            const bodyEl = document.getElementById('tableBody');
            const tableContainer = document.getElementById('table-container');
            const countEl = document.getElementById('result-count');
            const noResultsEl = document.getElementById('noResults');
            headerEl.innerHTML = ''; bodyEl.innerHTML = '';

            if (!dataRows || dataRows.length === 0) {
                tableContainer.classList.add('hidden');
                if (countEl) countEl.classList.add('hidden');
                noResultsEl.classList.remove('hidden');
                updateScrollHints();
                return;
            }

            tableContainer.classList.remove('hidden');
            noResultsEl.classList.add('hidden');
            
            if (countEl) {
                countEl.innerText = `共 ${dataRows.length} 筆搜尋結果`;
                countEl.classList.remove('hidden');
            }

            const headerRow = document.createElement('tr');
            DISPLAY_CONFIG.forEach((config, index) => {
                if (!columnVisibility[index]) return;
                const th = document.createElement('th');
                th.className = "px-6 py-4 text-left text-xs font-extrabold text-slate-600 uppercase tracking-wider";
                if(config.isSN) th.className += " sn-cell";
                if(config.isSource) th.className += " source-cell";
                th.textContent = config.display;
                headerRow.appendChild(th);
            });
            headerEl.appendChild(headerRow);

            dataRows.forEach((row, rowIndex) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50/50 transition-colors align-top";
                DISPLAY_CONFIG.forEach((config, i) => {
                    if (!columnVisibility[i]) return;
                    const td = document.createElement('td');
                    td.className = "px-6 py-5 border-b border-slate-100";
                    
                    if (config.isSN) {
                        td.className += " sn-cell";
                        td.textContent = rowIndex + 1;
                    } else if (config.isSource) {
                        td.className += " source-cell";
                        td.textContent = row.__sheetSource || "總區";
                    } else {
                        const sheetIdx = columnMapping[i];
                        let cellContent = (sheetIdx !== -1 && row[sheetIdx]) ? row[sheetIdx] : "";
                        
                        // 優化：處理特定政策與「注意事項」欄位的換行與高亮
                        const autoWrapFields = ["機票差旅政策", "酒店差旅政策", "報價策略", "開票改票流程規範", "注意事項"];
                        if (autoWrapFields.includes(config.display)) {
                            cellContent = cellContent.replace(/\n/g, '<br>');
                            cellContent = cellContent.replace(/(?!^)([●■◆・])/g, '<br>$1');
                            cellContent = cellContent.replace(/(?!^)(\d+[\.\)])/g, '<br>$1');
                            cellContent = cellContent.replace(/(?!^)([一二三四五六七八九十]+[、\.])/g, '<br>$1');
                        }

                        if (cellContent.length > 25) td.classList.add('content-cell');
                        else td.classList.add('whitespace-nowrap');

                        // 文字高亮處理
                        let html = boldMatches(cellContent, lastSearchTerm); 
                        html = highlightCurrencies(html); 
                        html = highlightJobKeywords(html); 
                        
                        // 數據高亮 (避開項目符號)
                        if (autoWrapFields.includes(config.display)) {
                            html = highlightNumbers(html);
                        }
                        
                        td.innerHTML = html;
                    }
                    tr.appendChild(td);
                });
                bodyEl.appendChild(tr);
            });

            setTimeout(updateScrollHints, 150);
            tableContainer.onscroll = updateScrollHints;
        }

        function scrollTable(direction) {
            const container = document.getElementById('table-container');
            if (!container) return;
            const scrollDist = container.clientWidth * 0.7; 
            container.scrollBy({ left: direction === 'right' ? scrollDist : -scrollDist, behavior: 'smooth' });
        }

        function updateScrollHints() {
            const container = document.getElementById('table-container');
            const hintRight = document.getElementById('scroll-hint-right');
            const hintLeft = document.getElementById('scroll-hint-left');
            const queryView = document.getElementById('query-view');

            if (!container || !hintRight || !hintLeft || !queryView) return;
            if (queryView.classList.contains('hidden') || container.classList.contains('hidden')) {
                hintRight.classList.remove('show');
                hintLeft.classList.remove('show');
                return;
            }

            const isOverflowing = container.scrollWidth > (container.clientWidth + 5);
            const isAtStart = container.scrollLeft <= 15;
            const isAtEnd = (container.scrollLeft + container.clientWidth) >= (container.scrollWidth - 25);

            if (isOverflowing && !isAtEnd) hintRight.classList.add('show'); else hintRight.classList.remove('show');
            if (isOverflowing && !isAtStart) hintLeft.classList.add('show'); else hintLeft.classList.remove('show');
        }

        window.onresize = updateScrollHints;

        function showNoResultsFound(detailMsg) {
            document.getElementById('table-container').classList.add('hidden');
            const countEl = document.getElementById('result-count');
            if (countEl) countEl.classList.add('hidden');
            const noResultsEl = document.getElementById('noResults');
            noResultsEl.classList.remove('hidden');
            if(detailMsg) document.getElementById('noResultsDetail').innerText = detailMsg;
            updateScrollHints();
        }

        function performSearch(skipLoading = false) {
            const searchInput = document.getElementById('searchInput');
            const term = searchInput.value.toLowerCase().trim();
            lastSearchTerm = searchInput.value.trim(); 
            const noResultsEl = document.getElementById('noResults');
            const tableContainer = document.getElementById('table-container');
            const countEl = document.getElementById('result-count');
            const loadingEl = document.getElementById('loading');

            if (allMergedData.length === 0) { fetchSheetData(); return; }
            if (term === "") { 
                tableContainer.classList.add('hidden'); 
                if (countEl) countEl.classList.add('hidden');
                noResultsEl.classList.add('hidden'); 
                updateScrollHints(); 
                return; 
            }

            if (!skipLoading) {
                tableContainer.classList.add('hidden'); 
                if (countEl) countEl.classList.add('hidden');
                noResultsEl.classList.add('hidden'); 
                loadingEl.classList.remove('hidden');
            }

            const searchAction = () => {
                currentRows = allMergedData.filter(row => {
                    return row.some(cell => {
                        const cellStr = String(cell).toLowerCase();
                        if (cellStr.includes(term)) return true;
                        if (term.includes('/') && term.length >= 3) {
                            const parts = term.split('/');
                            const regex = new RegExp(`(^|/|\\-)${parts[0]}/0?${parts[1]}($|/|\\-)`);
                            if (regex.test(cellStr)) return true;
                        }
                        return false;
                    });
                });
                
                if (!skipLoading) loadingEl.classList.add('hidden');
                
                if (currentRows.length === 0) {
                    showNoResultsFound(`在六個區域分頁中，找不到關於「${lastSearchTerm}」的資料。`);
                } else {
                    renderTable(currentRows);
                }
            };

            if (skipLoading) searchAction(); else setTimeout(searchAction, 400); 
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            if (e.target.value.trim() === "") {
                lastSearchTerm = "";
                document.getElementById('table-container').classList.add('hidden');
                const countEl = document.getElementById('result-count');
                if (countEl) countEl.classList.add('hidden');
                document.getElementById('noResults').classList.add('hidden');
                updateScrollHints();
            }
        });
    </script>
</body>
</html>
