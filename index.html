<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>差旅政策與報價查詢系統</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google 身份驗證 SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* 針對長文本欄位的優化：允許折行並限制寬度 */
        .content-cell {
            min-width: 200px;
            max-width: 400px;
            white-space: normal !important;
            word-break: break-all;
        }
        /* 固定表頭 */
        .table-sticky-header th {
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: #f8fafc;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div id="app" class="max-w-[95%] mx-auto px-4 py-8">
        <!-- 標題區 -->
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-extrabold text-slate-800 mb-2">企業客戶差旅政策查詢</h1>
            <p class="text-slate-500">法人代碼 / 政策規範 / 報價策略 即時檢索</p>
        </header>

        <!-- 登入介面 -->
        <div id="login-view" class="flex flex-col items-center justify-center py-20 bg-white rounded-3xl shadow-xl border border-slate-100 max-w-xl mx-auto">
            <div class="mb-8 p-4 bg-blue-50 rounded-full text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 mb-4">身份驗證</h2>
            <p class="text-slate-600 mb-8 text-center px-6">
                本系統包含敏感報價資訊，請使用具備權限的 Google 帳號登入。
            </p>
            <button onclick="handleAuthClick()" class="flex items-center px-8 py-4 bg-white border border-slate-300 rounded-2xl shadow-sm hover:bg-slate-50 hover:shadow-md transition-all duration-300 text-slate-700 font-bold group">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-6 h-6 mr-4 group-hover:scale-110 transition-transform" alt="Google">
                驗證帳號權限
            </button>
            <div id="auth-error" class="mt-6 text-red-500 font-medium hidden text-center px-4 bg-red-50 py-3 rounded-xl border border-red-100"></div>
        </div>

        <!-- 查詢介面 -->
        <div id="query-view" class="hidden">
            <div class="bg-white p-6 rounded-3xl shadow-lg border border-slate-100 mb-8">
                <div class="flex flex-col md:flex-row md:items-center gap-4">
                    <!-- 搜尋欄位與按鈕組合 -->
                    <div class="flex flex-1 relative group shadow-sm rounded-2xl overflow-hidden border border-slate-200">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </span>
                        <input type="text" id="searchInput" 
                            placeholder="搜尋法人代碼、日期 (如 2/12) 或 政策關鍵字..." 
                            class="block w-full pl-12 pr-4 py-4 bg-slate-50 focus:bg-white outline-none transition-all placeholder:text-slate-400 text-slate-700 font-bold"
                            onkeypress="if(event.keyCode==13) performSearch()">
                        
                        <button onclick="performSearch()" 
                            class="px-8 bg-blue-600 text-white font-bold hover:bg-blue-700 active:bg-blue-800 transition-colors whitespace-nowrap">
                            查詢
                        </button>
                    </div>
                    
                    <button onclick="signOut()" class="px-4 py-2 text-sm font-medium text-slate-400 hover:text-red-500 transition-colors">登出</button>
                </div>
            </div>

            <!-- 載入中動畫 (包含初始載入與搜尋中) -->
            <div id="loading" class="flex flex-col items-center justify-center py-20 hidden">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-10 w-10 mb-4"></div>
                <p id="loadingText" class="text-slate-400 font-medium text-lg">正在處理中...</p>
            </div>

            <!-- 表格區 -->
            <div id="table-container" class="overflow-x-auto bg-white rounded-3xl shadow-xl border border-slate-100 hidden">
                <table class="min-w-full divide-y divide-slate-100">
                    <thead id="tableHeader" class="table-sticky-header"></thead>
                    <tbody id="tableBody" class="divide-y divide-slate-50 text-sm text-slate-600 font-medium"></tbody>
                </table>
            </div>
            
            <!-- 查無資料狀態 -->
            <div id="noResults" class="hidden flex flex-col items-center justify-center py-20 bg-white rounded-3xl border border-slate-100 shadow-sm">
                <div class="text-slate-200 mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 9.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h3 id="noResultsTitle" class="text-xl font-bold text-slate-400">查無符合條件的資料</h3>
                <p id="noResultsDesc" class="text-slate-300 mt-2">請嘗試更換關鍵字或檢查輸入內容</p>
            </div>
        </div>
    </div>

    <script>
        /** --- 設定區 --- **/
        const CLIENT_ID = '888137251021-14u8ge7mc2di0rji31tm18unta568lou.apps.googleusercontent.com'; 
        const SPREADSHEET_ID = '1csWqYCN82PEoe27Nuz5KxY6uM_4Qb_UgBA-6Okooj2g';
        const RANGE = '工作表1!A1:Z1000'; 

        let allData = [];
        let tokenClient;
        let accessToken = null;

        window.onload = function() {
            if (typeof google !== 'undefined') {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
                    callback: (response) => {
                        if (response.error !== undefined) throw (response);
                        accessToken = response.access_token;
                        showQueryView();
                        fetchSheetData();
                    },
                });
            }
        };

        function handleAuthClick() {
            tokenClient && tokenClient.requestAccessToken({prompt: 'consent'});
        }

        function signOut() {
            if (accessToken) {
                google.accounts.oauth2.revokeToken(accessToken);
                accessToken = null;
            }
            location.reload();
        }

        function showQueryView() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('query-view').classList.remove('hidden');
        }

        async function fetchSheetData() {
            const loadingEl = document.getElementById('loading');
            const loadingText = document.getElementById('loadingText');
            loadingText.innerText = "正在載入最新報價與政策資料...";
            loadingEl.classList.remove('hidden');

            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${RANGE}`;
            
            try {
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();
                
                if (data.error) {
                    document.getElementById('auth-error').innerText = "讀取失敗：" + data.error.message;
                    document.getElementById('auth-error').classList.remove('hidden');
                    return;
                }
                
                if (data.values && data.values.length > 0) {
                    allData = data.values;
                    renderTable(allData);
                    document.getElementById('table-container').classList.remove('hidden');
                } else {
                    allData = [];
                    showNoResults("雲端試算表內目前沒有任何資料", "請確認分頁名稱是否正確，或試算表內是否已有內容。");
                }
            } catch (err) {
                console.error(err);
                showNoResults("連線發生錯誤", "無法連線至 Google 試算表，請檢查您的網路或 Client ID 設定。");
            } finally {
                loadingEl.classList.add('hidden');
            }
        }

        function renderTable(rows) {
            const headerEl = document.getElementById('tableHeader');
            const bodyEl = document.getElementById('tableBody');
            const tableContainer = document.getElementById('table-container');
            const noResultsEl = document.getElementById('noResults');

            headerEl.innerHTML = ''; bodyEl.innerHTML = '';

            if (rows.length <= 1) {
                tableContainer.classList.add('hidden');
                return;
            }

            tableContainer.classList.remove('hidden');
            noResultsEl.classList.add('hidden');

            const headers = rows[0];
            const headerRow = document.createElement('tr');
            headers.forEach(text => {
                const th = document.createElement('th');
                th.className = "px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider border-b border-slate-200";
                th.textContent = text;
                headerRow.appendChild(th);
            });
            headerEl.appendChild(headerRow);

            rows.slice(1).forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50/50 transition-colors";
                headers.forEach((_, i) => {
                    const td = document.createElement('td');
                    const cellContent = row[i] || "";
                    td.className = "px-6 py-4 border-b border-slate-50";
                    if (cellContent.length > 20) {
                        td.classList.add('content-cell');
                    } else {
                        td.classList.add('whitespace-nowrap');
                    }
                    td.textContent = cellContent;
                    tr.appendChild(td);
                });
                bodyEl.appendChild(tr);
            });
        }

        function showNoResults(title, desc) {
            const noResultsEl = document.getElementById('noResults');
            const titleEl = document.getElementById('noResultsTitle');
            const descEl = document.getElementById('noResultsDesc');
            
            titleEl.innerText = title;
            descEl.innerText = desc;
            
            noResultsEl.classList.remove('hidden');
            document.getElementById('table-container').classList.add('hidden');
        }

        // 執行搜尋邏輯 (增加動畫效果與防呆)
        function performSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            const noResultsEl = document.getElementById('noResults');
            const tableContainer = document.getElementById('table-container');
            const loadingEl = document.getElementById('loading');
            const loadingText = document.getElementById('loadingText');

            // 如果 allData 還是空的，嘗試重新抓取一次
            if (allData.length === 0) {
                fetchSheetData();
                return;
            }

            // 顯示搜尋中動畫
            tableContainer.classList.add('hidden');
            noResultsEl.classList.add('hidden');
            loadingText.innerText = "正在查詢比對資料...";
            loadingEl.classList.remove('hidden');

            // 使用 setTimeout 模擬搜尋處理過程
            setTimeout(() => {
                const headers = allData[0];
                const content = allData.slice(1);

                if (term === "") {
                    renderTable(allData);
                    loadingEl.classList.add('hidden');
                    return;
                }

                const filtered = content.filter(row => {
                    return row.some(cell => {
                        const cellStr = String(cell).toLowerCase();
                        if (cellStr.includes(term)) return true;
                        if (term.includes('/') && term.length >= 3) {
                            const parts = term.split('/');
                            const regex = new RegExp(`(^|/|\\-)${parts[0]}/0?${parts[1]}($|/|\\-)`);
                            if (regex.test(cellStr)) return true;
                        }
                        return false;
                    });
                });
                
                loadingEl.classList.add('hidden');

                if (filtered.length === 0) {
                    showNoResults("查無符合條件的資料", "找不到關鍵字：「" + term + "」，請更換搜尋詞後再試一次。");
                } else {
                    renderTable([headers, ...filtered]);
                    noResultsEl.classList.add('hidden');
                }
            }, 600); 
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            if (e.target.value.trim() === "") {
                renderTable(allData);
                document.getElementById('noResults').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
