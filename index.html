<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業差旅政策查詢系統</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google 身份驗證 SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
        }

        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .content-cell {
            min-width: 280px;
            max-width: 550px;
            white-space: normal !important;
            word-break: break-all;
            line-height: 1.7;
            vertical-align: top;
        }

        /* 核心優化：固定表頭樣式 */
        .table-sticky-header th {
            position: sticky;
            top: 0; 
            z-index: 40;
            background-color: #ffffff; 
            box-shadow: inset 0 -2px 0 #f1f5f9;
            white-space: nowrap;
        }

        /* 表格容器 */
        #table-container {
            overflow: auto;
            max-height: 75vh; 
            background-color: white;
            border-radius: 1.25rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
        }

        /* 搜尋結果字級：12pt */
        .result-font-size {
            font-size: 12pt !important;
        }

        /* 數字高亮樣式 (精緻的玫瑰紅) */
        .highlight-num {
            color: #e11d48; /* rose-600 */
            font-weight: 700;
        }
        
        /* 搜尋詞匹配樣式 (專業藍) */
        .match-bold {
            color: #2563eb; 
            background-color: #eff6ff;
            padding: 0 2px;
            border-radius: 2px;
            font-weight: 700;
        }
        
        /* 幣別高亮樣式 */
        .currency-bold {
            font-weight: 700;
            color: #334155;
        }
        
        /* 職務關鍵字高亮 (質感深藍) */
        .job-keyword {
            color: #1e1b4b; /* indigo-950 */
            font-weight: 800;
            text-decoration: underline;
            text-underline-offset: 4px;
            text-decoration-color: #cbd5e1;
        }

        /* 區域來源標籤 (Badge) */
        .region-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            background-color: #e0f2fe;
            color: #0369a1;
            border: 1px solid #bae6fd;
        }

        /* 捲軸美化 */
        .custom-scrollbar::-webkit-scrollbar {
            height: 10px;
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f8fafc;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
            border: 3px solid #f8fafc;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        
        /* 專用窄欄位樣式 */
        .sn-cell {
            width: 60px;
            text-align: center;
            font-weight: 600;
            color: #94a3b8;
        }

        /* 底部滑動提示 */
        .scroll-hint-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem; /* 確保在右側 */
            z-index: 9999;
            background-color: #1e293b;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            pointer-events: none;
            backdrop-filter: blur(8px);
        }

        .scroll-hint-btn.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* Google 標準白色按鈕樣式 */
        .google-auth-btn {
            background-color: #ffffff;
            color: #3c4043;
            border: 1px solid #dadce0;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-family: 'Roboto', 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s, box-shadow 0.2s;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.30), 0 1px 3px 1px rgba(60,64,67,0.15);
        }

        .google-auth-btn:hover {
            background-color: #f8f9fa;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.30), 0 4px 8px 3px rgba(60,64,67,0.15);
        }

        .google-auth-btn:active {
            background-color: #eeeeee;
        }

        .google-auth-btn img {
            width: 18px;
            height: 18px;
            margin-right: 12px;
        }
    </style>
</head>
<body class="bg-[#fcfdfe] min-h-screen text-slate-800">

    <div id="app" class="max-w-[98%] mx-auto px-4 py-10">
        <!-- 標題區 -->
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-black text-slate-900 mb-3 tracking-tight">企業差旅政策查詢</h1>
            <div class="flex items-center justify-center gap-2">
                <span class="h-px w-8 bg-slate-200"></span>
                <p id="sub-title" class="text-slate-400 font-medium text-sm">已整合：台北、桃園、新竹、台中、台南、高雄全區資料</p>
                <span class="h-px w-8 bg-slate-200"></span>
            </div>
        </header>

        <!-- 登入介面 -->
        <div id="login-view" class="flex flex-col items-center justify-center py-24 bg-white rounded-[2rem] shadow-2xl shadow-slate-200/50 border border-slate-100 max-w-lg mx-auto">
            <div class="mb-8 w-20 h-20 bg-blue-50 rounded-3xl flex items-center justify-center text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-900 mb-4">身份認證</h2>
            <p class="text-slate-500 mb-10 text-center px-10 leading-relaxed text-sm">
                為了資訊安全，請使用具備「試算表讀取權限」的 Google 帳號登入系統。
            </p>
            
            <!-- 使用白色官方樣式按鈕 -->
            <button id="auth-btn" onclick="handleAuthClick()" class="google-auth-btn group disabled:opacity-50">
                <img id="g-logo" src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google">
                <span>使用 Google 帳號登入</span>
            </button>
            <div id="auth-error" class="mt-8 text-red-500 font-medium hidden text-center px-6 bg-red-50 py-3 rounded-xl border border-red-100 text-xs"></div>
        </div>

        <!-- 查詢介面 -->
        <div id="query-view" class="hidden">
            <!-- 搜尋區 -->
            <div class="bg-white p-2 rounded-3xl shadow-xl shadow-slate-200/40 border border-slate-100 mb-4">
                <div class="flex flex-col lg:flex-row items-stretch gap-2">
                    <div class="flex-1 relative flex items-center">
                        <span class="absolute left-5 text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </span>
                        <input type="text" id="searchInput" 
                            placeholder="輸入關鍵字：代碼、姓名、企業戶名稱" 
                            class="w-full pl-14 pr-6 py-5 bg-slate-50/50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-400 text-slate-700 font-bold"
                            onkeydown="if(event.key === 'Enter') performSearch()">
                    </div>
                    <button id="searchBtn" onclick="performSearch()" 
                        class="px-10 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 active:scale-95 transition-all shadow-lg shadow-blue-200">
                        查詢
                    </button>
                    <button onclick="signOut()" class="px-6 py-4 text-xs font-bold text-slate-400 hover:text-red-500 transition-colors">登出</button>
                </div>
            </div>

            <!-- 篩選器 -->
            <div class="bg-slate-50/50 p-6 rounded-3xl border border-slate-100 mb-8">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center">
                        顯示欄位控制
                    </h3>
                    <button onclick="toggleAllColumns(true)" class="text-blue-600 text-xs font-bold hover:underline">顯示全部欄位</button>
                </div>
                <div id="column-filters" class="flex flex-wrap gap-x-6 gap-y-3">
                    <span class="text-slate-400 text-xs italic">同步資料中...</span>
                </div>
            </div>

            <!-- 加載與錯誤 -->
            <div id="loading" class="flex flex-col items-center justify-center py-32 hidden">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-100 h-12 w-12 mb-6"></div>
                <p class="text-slate-400 font-bold tracking-wide">正在同步雲端最新數據...</p>
            </div>

            <div id="api-error-display" class="hidden max-w-lg mx-auto p-10 bg-white border border-red-100 rounded-[2.5rem] shadow-2xl text-center">
                <h3 class="text-xl font-bold text-slate-900 mb-2">無法連線至試算表</h3>
                <p id="api-error-msg" class="text-red-500 text-sm mb-8 font-medium"></p>
                <button onclick="fetchSheetData()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold shadow-xl">重新嘗試連線</button>
            </div>

            <!-- 筆數提示 -->
            <div id="result-count" class="mb-4 inline-flex items-center px-4 py-2 bg-white rounded-full text-xs font-black text-slate-500 shadow-sm border border-slate-100 hidden"></div>

            <!-- 表格區域 -->
            <div class="relative">
                <div id="table-container" class="custom-scrollbar hidden">
                    <table id="main-table" class="min-w-full border-separate border-spacing-0">
                        <thead id="tableHeader" class="table-sticky-header"></thead>
                        <tbody id="tableBody" class="text-slate-600 font-medium result-font-size"></tbody>
                    </table>
                </div>
            </div>
            
            <div id="noResults" class="hidden flex flex-col items-center justify-center py-32 bg-white rounded-[2rem] border border-slate-100 shadow-sm">
                <div class="text-slate-200 mb-6 scale-150">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <h3 class="text-lg font-bold text-slate-400 uppercase tracking-widest">查無相符資料</h3>
                <p id="noResultsDetail" class="text-slate-300 mt-2 text-sm font-medium">試試看不同的關鍵字</p>
            </div>
        </div>
    </div>

    <!-- 左右導航提示 (確保在右側) -->
    <div id="scroll-hint-right" class="scroll-hint-btn" onclick="scrollTable('right')">
        更多資訊 <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 animate-bounce-x" style="animation: bounce-x 1s infinite;" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" /></svg>
    </div>
    <div id="scroll-hint-left" class="scroll-hint-btn" style="left: 2rem; right: auto;" onclick="scrollTable('left')">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 17l-5-5m0 0l5-5m-5 5h12" /></svg> 返回前面
    </div>

    <script>
        /** --- 多分頁核心設定 --- **/
        const CLIENT_ID = '888137251021-14u8ge7mc2di0rji31tm18unta568lou.apps.googleusercontent.com'; 
        const SPREADSHEET_ID = '1csWqYCN82PEoe27Nuz5KxY6uM_4Qb_UgBA-6Okooj2g';
        
        const TARGET_SHEETS = [
            '行政-合約管理(台北)', '行政-合約管理(桃園)', '行政-合約管理(新竹)', 
            '行政-合約管理(台中)', '行政-合約管理(台南)', '行政-合約管理(高雄)'
        ];

        const DISPLAY_CONFIG = [
            { original: "序號", display: "序號", isSN: true },
            { original: "區域來源", display: "區域", isSource: true }, 
            { original: "法人代碼", display: "法人代碼" },
            { original: "企業同行名稱", display: "企業戶名稱" },
            { original: "主要服務單位", display: "服務單位" },
            { original: "主要服務業務", display: "業務" },
            { original: "出差是否需經過核准", display: "需核准" },
            { original: "開票&改票流程及規範說明", display: "開票改票流程" },
            { original: "機票差旅政策 AIR (範例: 可訂艙等職級/條件、差旅偏好)", display: "機票政策" },
            { original: "飯店費用預算/條件 HOTEL", display: "飯店政策" },
            { original: "報價策略", display: "報價策略" },
            { original: "付款方式", display: "付款" },
            { original: "代轉開立", display: "代轉" },
            { original: "注意事項", display: "注意事項" },
            { original: "更新時間 (可直接打上2/12會自動加上年份)", display: "更新時間" }
        ];

        let allMergedData = []; 
        let currentRows = []; 
        let columnMapping = []; 
        let tokenClient = null;
        let accessToken = null;
        let isGoogleSdkLoaded = false;
        let columnVisibility = []; 
        let lastSearchTerm = "";

        function initGoogleAuth() {
            if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
                try {
                    tokenClient = google.accounts.oauth2.initTokenClient({
                        client_id: CLIENT_ID,
                        scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
                        callback: (response) => {
                            if (response.error !== undefined) {
                                showError("授權失敗: " + response.error);
                                return;
                            }
                            accessToken = response.access_token;
                            showQueryView();
                            fetchSheetData();
                        },
                    });
                    isGoogleSdkLoaded = true;
                    document.getElementById('auth-btn').disabled = false;
                } catch (e) {
                    showError("系統初始化失敗，請重新整理頁面。");
                }
            } else {
                setTimeout(initGoogleAuth, 800);
            }
        }

        window.onload = initGoogleAuth;

        function handleAuthClick() {
            if (!isGoogleSdkLoaded || !tokenClient) return;
            tokenClient.requestAccessToken({ prompt: 'consent' });
        }

        function signOut() {
            if (accessToken) google.accounts.oauth2.revokeToken(accessToken);
            location.reload();
        }

        function showQueryView() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('query-view').classList.remove('hidden');
        }

        function showError(msg) {
            const errorEl = document.getElementById('auth-error');
            errorEl.innerText = msg;
            errorEl.classList.remove('hidden');
        }

        async function fetchSheetData() {
            const loadingEl = document.getElementById('loading');
            const errorDisplay = document.getElementById('api-error-display');
            const tableContainer = document.getElementById('table-container');
            
            errorDisplay.classList.add('hidden');
            tableContainer.classList.add('hidden');
            loadingEl.classList.remove('hidden');

            try {
                const rangesParam = TARGET_SHEETS.map(s => `ranges=${encodeURIComponent(s + '!A1:Z2000')}`).join('&');
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values:batchGet?${rangesParam}`;
                
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();
                
                if (data.error) throw new Error(data.error.message);
                
                allMergedData = [];
                let firstSheetHeaders = [];

                if (data.valueRanges && data.valueRanges.length > 0) {
                    data.valueRanges.forEach((vr, index) => {
                        const sheetFullName = TARGET_SHEETS[index];
                        const regionLabel = sheetFullName.match(/\((.*?)\)/)?.[1] || sheetFullName;
                        const rows = vr.values;
                        
                        if (rows && rows.length > 0) {
                            if (index === 0) firstSheetHeaders = rows[0]; 
                            rows.slice(1).forEach(row => {
                                if (row.length === 0 || row.every(c => !c || c.trim() === "")) return;
                                const rowWithMeta = [...row];
                                rowWithMeta.__sheetSource = regionLabel;
                                allMergedData.push(rowWithMeta);
                            });
                        }
                    });

                    buildColumnMapping(firstSheetHeaders);
                    columnVisibility = new Array(DISPLAY_CONFIG.length).fill(true);
                    initColumnFilters();
                    
                    if (document.getElementById('searchInput').value.trim() !== "") {
                        performSearch(true);
                    }
                }
            } catch (err) {
                document.getElementById('api-error-msg').innerText = err.message;
                errorDisplay.classList.remove('hidden');
            } finally {
                loadingEl.classList.add('hidden');
            }
        }

        function buildColumnMapping(sheetHeaders) {
            columnMapping = [];
            DISPLAY_CONFIG.forEach(config => {
                if (config.isSN) { columnMapping.push(-2); return; }
                if (config.isSource) { columnMapping.push(-3); return; }
                const idx = sheetHeaders.findIndex(h => h.trim().includes(config.original.substring(0, 10)));
                columnMapping.push(idx);
            });
        }

        function initColumnFilters() {
            const container = document.getElementById('column-filters');
            container.innerHTML = '';
            DISPLAY_CONFIG.forEach((config, index) => {
                if (config.isSN || config.isSource) return;
                const label = document.createElement('label');
                label.className = "inline-flex items-center cursor-pointer group hover:bg-white px-3 py-1.5 rounded-xl transition-all";
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = true;
                checkbox.className = "w-4 h-4 text-blue-600 bg-slate-100 border-slate-200 rounded-lg focus:ring-blue-500";
                checkbox.onchange = (e) => {
                    columnVisibility[index] = e.target.checked;
                    if (!document.getElementById('table-container').classList.contains('hidden')) renderTable(currentRows);
                };
                const span = document.createElement('span');
                // 優化：將核選欄位名稱改為 12pt
                span.className = "ml-2.5 text-slate-500 group-hover:text-blue-600 font-bold transition-colors";
                span.style.fontSize = "12pt";
                span.textContent = config.display;
                label.appendChild(checkbox);
                label.appendChild(span);
                container.appendChild(label);
            });
        }

        function toggleAllColumns(isVisible) {
            const checkboxes = document.getElementById('column-filters').querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach((cb) => cb.checked = isVisible);
            columnVisibility.forEach((_, idx) => {
                if (idx > 1) columnVisibility[idx] = isVisible; 
            });
            if (!document.getElementById('table-container').classList.contains('hidden')) renderTable(currentRows);
        }

        function highlightCurrencies(text) {
            if (!text) return "";
            const currencyRegex = /\b(USD|TWD|HKD|JPY|EUR|CNY|RMB|SGD|AUD|GBP|CAD|CHF)\b/g;
            return text.replace(currencyRegex, '<span class="currency-bold">$1</span>');
        }

        function highlightJobKeywords(text) {
            if (!text) return "";
            return text.replace(/(董事長|總經理|副總|營運長|總監|執行長)/g, '<span class="job-keyword">$1</span>');
        }

        function highlightNumbers(text) {
            if (!text) return "";
            const parts = text.split(/(<[^>]+>)/g);
            return parts.map(part => {
                if (part && part.startsWith('<')) return part;
                return part.replace(/(\*\d+)|(\d+[\.\)])|([一二三四五六七八九十]+[、\.])|(\d+)|([一二三四五六七八九十百千萬零]+)/g, (match, pStar, p1, p2, p3, p4) => {
                    if (pStar) return `<span class="highlight-num">${match}</span>`;
                    if (p1) {
                        const val = parseInt(p1.replace(/[^\d]/g, ''));
                        if (val >= 100) return `<span class="highlight-num">${match}</span>`;
                        return match; 
                    }
                    if (p2) return match; 
                    return `<span class="highlight-num">${match}</span>`;
                });
            }).join('');
        }

        function boldMatches(text, term) {
            if (!text || !term) return text;
            const regex = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, '<b class="match-bold">$1</b>');
        }

        function renderTable(dataRows) {
            const headerEl = document.getElementById('tableHeader');
            const bodyEl = document.getElementById('tableBody');
            const tableContainer = document.getElementById('table-container');
            const countEl = document.getElementById('result-count');
            const noResultsEl = document.getElementById('noResults');
            headerEl.innerHTML = ''; bodyEl.innerHTML = '';

            if (!dataRows || dataRows.length === 0) {
                tableContainer.classList.add('hidden');
                if (countEl) countEl.classList.add('hidden');
                noResultsEl.classList.remove('hidden');
                updateScrollHints();
                return;
            }

            tableContainer.classList.remove('hidden');
            noResultsEl.classList.add('hidden');
            
            if (countEl) {
                countEl.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 mr-2" viewBox="0 0 20 20" fill="currentColor"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z" /></svg> 共 ${dataRows.length} 筆搜尋結果`;
                countEl.classList.remove('hidden');
            }

            const headerRow = document.createElement('tr');
            DISPLAY_CONFIG.forEach((config, index) => {
                if (!columnVisibility[index]) return;
                const th = document.createElement('th');
                th.className = "px-6 py-5 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest";
                if(config.isSN) th.className += " sn-cell";
                th.textContent = config.display;
                headerRow.appendChild(th);
            });
            headerEl.appendChild(headerRow);

            dataRows.forEach((row, rowIndex) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/80 transition-colors duration-150 align-top group";
                DISPLAY_CONFIG.forEach((config, i) => {
                    if (!columnVisibility[i]) return;
                    const td = document.createElement('td');
                    td.className = "px-6 py-6 border-b border-slate-50";
                    
                    if (config.isSN) {
                        td.className += " sn-cell opacity-50 font-bold group-hover:opacity-100 transition-opacity";
                        td.textContent = rowIndex + 1;
                    } else if (config.isSource) {
                        td.innerHTML = `<span class="region-badge">${row.__sheetSource || "總區"}</span>`;
                    } else {
                        const sheetIdx = columnMapping[i];
                        let cellContent = (sheetIdx !== -1 && row[sheetIdx]) ? row[sheetIdx] : "";
                        
                        const autoWrapFields = ["機票政策", "飯店政策", "報價策略", "開票改票流程", "注意事項"];
                        if (autoWrapFields.includes(config.display)) {
                            cellContent = cellContent.replace(/\n/g, '<br>');
                            cellContent = cellContent.replace(/(?!^)([●■◆・])/g, '<br>$1');
                            cellContent = cellContent.replace(/(?!^)(?<!\*)(\d+[\.\)])/g, '<br>$1');
                            cellContent = cellContent.replace(/(?!^)([一二三四五六七八九十]+[、\.])/g, '<br>$1');
                        }

                        if (cellContent.length > 25) td.classList.add('content-cell');
                        else td.classList.add('whitespace-nowrap');

                        let html = boldMatches(cellContent, lastSearchTerm); 
                        html = highlightCurrencies(html); 
                        html = highlightJobKeywords(html); 
                        
                        if (autoWrapFields.includes(config.display)) {
                            html = highlightNumbers(html);
                        }
                        
                        td.innerHTML = html;
                    }
                    tr.appendChild(td);
                });
                bodyEl.appendChild(tr);
            });

            setTimeout(updateScrollHints, 150);
            tableContainer.onscroll = updateScrollHints;
        }

        function scrollTable(direction) {
            const container = document.getElementById('table-container');
            if (!container) return;
            const scrollDist = container.clientWidth * 0.7; 
            container.scrollBy({ left: direction === 'right' ? scrollDist : -scrollDist, behavior: 'smooth' });
        }

        function updateScrollHints() {
            const container = document.getElementById('table-container');
            const hintRight = document.getElementById('scroll-hint-right');
            const hintLeft = document.getElementById('scroll-hint-left');
            const queryView = document.getElementById('query-view');

            if (!container || !hintRight || !hintLeft || !queryView) return;
            if (queryView.classList.contains('hidden') || container.classList.contains('hidden')) {
                hintRight.classList.remove('show');
                hintLeft.classList.remove('show');
                return;
            }

            const isOverflowing = container.scrollWidth > (container.clientWidth + 5);
            const isAtStart = container.scrollLeft <= 20;
            const isAtEnd = (container.scrollLeft + container.clientWidth) >= (container.scrollWidth - 30);

            if (isOverflowing && !isAtEnd) hintRight.classList.add('show'); else hintRight.classList.remove('show');
            if (isOverflowing && !isAtStart) hintLeft.classList.add('show'); else hintLeft.classList.remove('show');
        }

        window.onresize = updateScrollHints;

        function performSearch(skipLoading = false) {
            const searchInput = document.getElementById('searchInput');
            const term = searchInput.value.toLowerCase().trim();
            lastSearchTerm = searchInput.value.trim(); 
            const noResultsEl = document.getElementById('noResults');
            const tableContainer = document.getElementById('table-container');
            const countEl = document.getElementById('result-count');
            const loadingEl = document.getElementById('loading');

            if (allMergedData.length === 0) { fetchSheetData(); return; }
            if (term === "") { 
                tableContainer.classList.add('hidden'); 
                if (countEl) countEl.classList.add('hidden');
                noResultsEl.classList.add('hidden'); 
                updateScrollHints(); 
                return; 
            }

            if (!skipLoading) {
                tableContainer.classList.add('hidden'); 
                if (countEl) countEl.classList.add('hidden');
                noResultsEl.classList.add('hidden'); 
                loadingEl.classList.remove('hidden');
            }

            const searchAction = () => {
                currentRows = allMergedData.filter(row => {
                    return row.some(cell => {
                        const cellStr = String(cell).toLowerCase();
                        if (cellStr.includes(term)) return true;
                        if (term.includes('/') && term.length >= 3) {
                            const parts = term.split('/');
                            const regex = new RegExp(`(^|/|\\-)${parts[0]}/0?${parts[1]}($|/|\\-)`);
                            if (regex.test(cellStr)) return true;
                        }
                        return false;
                    });
                });
                
                if (!skipLoading) loadingEl.classList.add('hidden');
                if (currentRows.length === 0) {
                    tableContainer.classList.add('hidden');
                    if (countEl) countEl.classList.add('hidden');
                    noResultsEl.classList.remove('hidden');
                } else {
                    renderTable(currentRows);
                }
            };

            if (skipLoading) searchAction(); else setTimeout(searchAction, 400); 
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            if (e.target.value.trim() === "") {
                lastSearchTerm = "";
                document.getElementById('table-container').classList.add('hidden');
                const countEl = document.getElementById('result-count');
                if (countEl) countEl.classList.add('hidden');
                document.getElementById('noResults').classList.add('hidden');
                updateScrollHints();
            }
        });
    </script>
</body>
</html>
